<section class="section contact" appSection="contact">
  <div class="container narrow">
    <p class="mono kicker" appReveal>05. Contact</p>
    <h2 appReveal="70ms">Get in touch</h2>
    <p class="blurb" appReveal="140ms">
      I'm always glad to talk about Angular, satellite ground systems, game design, or AI systems.
      If you think I would be a good fit for your team or your problem, email is the best way to
      reach me.
    </p>
    <a class="btn btn-primary" [href]="'mailto:' + profile.email" appReveal="210ms">
      <app-icon name="email" [size]="18" />
      Say hello
    </a>
  </div>
</section>
