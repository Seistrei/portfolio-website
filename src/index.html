<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Heath Rohlman is a software engineer at RTX developing the Angular visualization framework behind browser-based satellite ground-system displays, previously for the James Webb Space Telescope. His personal projects include an autonomous AI companion built on event-driven microservices."
    />
    <meta property="og:title" content="Heath Rohlman · Software Engineer" />

      property="og:description"
      content="Software engineer at RTX building satellite ground-system displays in Angular, with personal projects spanning autonomous AI systems, game design, and the web."

    <meta property="og:url" content="https://seistrei.github.io/portfolio-website/" />

    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#05070f" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#faf9f5" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <script>
      // Apply the saved (or system) theme before Angular boots to avoid a flash.
      try {
        const saved = localStorage.getItem('hr-theme');
        const dark = saved
          ? saved === 'dark'
          : !matchMedia('(prefers-color-scheme: light)').matches;
        document.documentElement.dataset['theme'] = dark ? 'dark' : 'light';
      } catch {
        document.documentElement.dataset['theme'] = 'dark';
      }
    </script>
  </head>
  <body>
    <app-root></app-root>
    <noscript>This site requires JavaScript. You can reach me at heath.rohlman@gmail.com.</noscript>
  </body>
</html>
